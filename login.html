<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tailwind + daisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Github-issue-tracker</title>
  </head>
  <body>
    <section
      class="bg-gray-100 flex items-center justify-center min-h-screen p-4"
    >
      <div class="card w-96 bg-base-100 shadow-xl p-8 border border-gray-200">
        <div class="text-center mb-8 space-y-4">
          <div class="flex items-center justify-center mb-6">
            <img src="./assets/github-logo.png" alt="" />
          </div>
          <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <!-- form -->
        <div
          class="bg-base-200 border-base-300 rounded-box w-80 border py-6 px-5"
        >
          <fieldset class="fieldset">
            <legend class="fieldset-legend text-lg text-center font-semibold">
              Login
            </legend>

            <form id="loginForm" class="space-y-4">
              <label class="label">Username</label>
              <input
                type="text"
                id="username"
                placeholder="admin"
                class="input input-bordered w-full"
                required
              />

              <label class="label">Password</label>
              <input
                type="password"
                id="password"
                placeholder="admin123"
                class="input input-bordered w-full"
                required
              />

              <button type="submit" class="btn btn-primary w-full text-white">
                Sign In
              </button>
            </form>
          </fieldset>
        </div>

        <!-- bottom part -->
        <div
          class="mt-6 p-4 bg-gray-50 rounded-lg text-xs border border-dashed border-gray-300 space-y-2"
        >
          <p class="text-xl font-bold">Demo Credential:</p>
          <p class="text-[16px]">User: admin</p>
          <p class="text-[16px]">Pass: admin123</p>
        </div>
      </div>
    </section>
  </body>
</html>
