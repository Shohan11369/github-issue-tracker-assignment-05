<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind + daisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Github-issue-tracker</title>
  </head>
  <body class="container mx-auto">
    <nav class="navbar bg-base-100 shadow-sm px-4 lg:px-20">
      <div class="flex-1">
        <div class="flex gap-4 items-center">
          <img class="w-[50px]" src="./assets/github-logo.png" alt="" />
          <h2>GitHub Issues Tracker</h2>
        </div>
      </div>
      <div class="flex-none gap-2">
        <div class="join">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered join-item w-40 md:w-auto"
          />
          <button
            onclick="handleSearch()"
            class="btn btn-primary join-item text-white"
          >
            Search
          </button>
        </div>
      </div>
    </nav>

    <!-- main section -->

    <main class="mt-7 max-w-7xl mx-auto p-4 lg:p-10">
      <div
        class="flex flex-col md:flex-row justify-between items-center bg-gray-50 rounded-2xl mb-10 border border-red-200 p-5"
      >
        <div class="tabs tabs-boxed">
          <button
            class="tab tab-active text-white bg-blue-500 rounded-xl"
            onclick="filterIssues('all', this)"
          >
            All
          </button>
          <button class="tab" onclick="filterIssues('open', this)">Open</button>
          <button class="tab" onclick="filterIssues('closed', this)">
            Closed
          </button>
        </div>
      </div>
      <!-- left+ right side -->
      <div
        class="flex flex-col md:flex-row justify-between items-center bg-gray-100 rounded-2xl mb-8 p-6"
      >
        <!-- left -->
        <div class="flex items-center gap-4">
          <div class="bg-purple-200 p-3 rounded-full">
            <span class="text-purple-600 text-xl"><i class="fa-solid fa-gear"></i></span>
          </div>

          <div>
            <h2 class="text-xl font-bold">
              <span id="totalCount">0</span> Issues
            </h2>
            <p class="text-gray-500 text-sm">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <!-- right -->
        <div class="flex gap-6 mt-4 md:mt-0 font-bold text-sm">
          <span>🟢 Open: <span id="openCount">0</span></span>
          <span>🟣 Closed: <span id="closedCount">0</span></span>
        </div>
      </div>

      <!-- card-container -->
      <div id="loading-spinner" class="hidden text-center my-10">
        <span class="loading loading-spinner loading-lg"></span>
      </div>

      <!--  -->
      <div
        id="issue-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </main>

    <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="my_modal_content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./script/issues.js"></script>
  </body>
</html>
