<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tailwind + daisyUi -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Github-issue-tracker</title>
  </head>
  <body class="container mx-auto">
    <nav class="mt-6 flex">
      <nav class="navbar bg-base-100 shadow-sm px-4 lg:px-20 ">
        <div class="flex-1">
            <div class="flex gap-4 items-center">
              <img class="w-[50px]" src="./assets/github-logo.png" alt="">
            <h2>GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="flex-none gap-2">
            <div class="join">
                <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered join-item w-40 md:w-auto" />
                <button onclick="handleSearch()" class="btn btn-primary join-item text-white">Search</button>
            </div>
        </div>
  
    </nav>
  </body>
</html>
